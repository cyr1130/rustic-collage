      <section class="hero">
        <!-- 자동 슬라이드 (이미지 3장) — site-config.json 에서 주입 -->

          <div class="hero__slide hero__slide--3">
            <img src="" alt="" loading="lazy" fetchpriority="low" decoding="async" />
          </div>
        </div>

        <div class="hero__inner">
          <div class="hero__text">
            <h1 class="hero__title" id="hero-title" data-rc-anim="01">Rustic Collage</h1>
            <p class="hero__copy hero__copy--ko" id="hero-copy-ko"></p>
            <p class="hero__copy hero__copy--en" id="hero-copy-en"></p>
          </div>
        </div>

        <script>
          (function () {
            fetch('./site-config.json?t=' + Date.now())
              .then(function (r) { return r.ok ? r.json() : null; })
              .then(function (cfg) {
                if (!cfg) return;
                // 히어로
                if (cfg.hero) {
                  var h = cfg.hero;
                  var slides = document.querySelectorAll('#hero-bg .hero__slide img');
                  (h.images || []).slice(0, 3).forEach(function (src, i) {
                    if (slides[i] && src) slides[i].src = src;
                  });
                  if (h.title) {
                    var heroTitle = document.getElementById('hero-title');
                    if (heroTitle) {
                      heroTitle.textContent = h.title;
                      // letter-stagger 애니메이션 재바인딩 — 이전 split 상태와 bound flag 초기화
                      heroTitle.dataset.split = '';
                      heroTitle.removeAttribute('data-rc-anim-bound');
                      heroTitle.classList.remove('is-revealed');
                      if (window.RC_setupAnimations) window.RC_setupAnimations(heroTitle.parentElement);
                    }
                  }
                  if (h.copyKo) document.getElementById('hero-copy-ko').innerHTML = nlToBr(esc(h.copyKo));
                  if (h.copyEn) document.getElementById('hero-copy-en').innerHTML = nlToBr(esc(h.copyEn));
                }
                // 홈 컬렉션 카드 4개 — 카테고리별 이름/이미지/링크 갱신
                if (Array.isArray(cfg.homeCollection)) {
                  var grid = document.getElementById('home-collection-grid');
                  if (grid) {
                    var cards = grid.querySelectorAll('.product-card');
                    cfg.homeCollection.slice(0, cards.length).forEach(function (item, i) {
                      var card = cards[i];
                      if (!card) return;
                      var img = card.querySelector('img');
                      var nameEl = card.querySelector('.product-card__name');
                      if (item.image && img) img.src = item.image;
                      if (item.name && nameEl) nameEl.textContent = item.name;
                      if (img) img.alt = item.name || '';
                      if (item.category) {
                        card.setAttribute('href', './collection.html?cat=' + encodeURIComponent(item.category));
                      }
                    });
                  }
                }
                // 전화번호 — 컨택트 섹션의 CALL 링크 갱신
                if (cfg.phone) {
                  var telDigits = String(cfg.phone).replace(/[^\d+]/g, '');
                  var contactPhone = document.getElementById('contact-phone-link');
                  if (contactPhone) {
                    contactPhone.href = 'tel:' + telDigits;
                    contactPhone.textContent = 'CALL : ' + cfg.phone;
                  }
                  // 풋터 전화번호
                  var footerPhone = document.getElementById('footer-phone');
                  if (footerPhone) {
                    footerPhone.href = 'tel:' + telDigits;
                    footerPhone.textContent = cfg.phone;
                  }
                }
                // 이메일 — formsubmit URL + 표시되는 이메일 모두 갱신
                if (cfg.email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(cfg.email)) {
                  var form = document.getElementById('contact-form');
                  if (form) form.action = 'https://formsubmit.co/' + encodeURIComponent(cfg.email);
                  // 컨택 섹션에 표시되는 이메일 링크
                  var contactEmail = document.getElementById('contact-email-link');
                  if (contactEmail) {
                    contactEmail.href = 'mailto:' + cfg.email;
                    contactEmail.textContent = 'EMAIL : ' + cfg.email;
                  }
                  // 풋터 이메일
                  var footerEmail = document.getElementById('footer-email');
                  if (footerEmail) {
                    footerEmail.href = 'mailto:' + cfg.email;
                    footerEmail.textContent = cfg.email;
                  }
                }
              })
              .catch(function () { /* 설정 없으면 기본값 유지 */ });
            function esc(s) {
              return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
                return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
              });
            }
            function nlToBr(s) {
              // <br> 입력 허용 + 줄바꿈 → <br>
              return String(s).replace(/&lt;br\s*\/?&gt;/gi, '\n').replace(/\n/g, '<br>');
            }
          })();
        </script>

        <script>
          (function () {
            var grid = document.getElementById('home-projects-grid');
            if (!grid) return;
            var MAX_CARDS = 6;
            fetch('./projects-data.json?t=' + Date.now())
              .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
              })
              .then(function (data) {
                var list = (data.projects || []).slice().reverse().slice(0, MAX_CARDS);
                if (!list.length) {
                  grid.innerHTML = '<p style="color:#888;font-size:14px;">아직 등록된 프로젝트가 없습니다.</p>';
                  return;
                }
                grid.innerHTML = list.map(function (p, i) {
                  var name = esc(p.name || '');
                  // HOME 영역 전용 필드 사용 (없으면 fallback)
                  var thumbTitle = esc(p.thumbnailTitle || p.name || '');
                  // 썸네일 설명은 <br>를 줄바꿈으로 인식 (escMultiline)
                  var thumbDesc = escMultiline(p.thumbnailDesc || '');
                  var thumb = esc(p.thumbnail || '');
                  return (
                    '<a class="product-card" href="./project-detail.html?id=' + encodeURIComponent(p.id) + '">' +
                      '<figure class="product-card__media">' +
                        '<img src="' + thumb + '" alt="' + name + ' 프로젝트 이미지" loading="' + (i < 3 ? 'eager' : 'lazy') + '" />' +
                        '<div class="product-card__overlay">' +
                          '<h3 class="product-card__overlay-title">' + thumbTitle + '</h3>' +
                          (thumbDesc ? '<p class="product-card__overlay-desc">' + thumbDesc + '</p>' : '') +
                        '</div>' +
                      '</figure>' +
                    '</a>'
                  );
                }).join('');
                // 모바일에서만 자동 회전 슬라이드 시작
                startAutoSlide();
              })
              .catch(function (err) {
                grid.innerHTML = '<p style="color:#888;font-size:14px;">프로젝트 목록을 불러오지 못했습니다.</p>';
                console.error(err);
              });
            function esc(s) {
              return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
                return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
              });
            }
            // <br>은 줄바꿈으로 허용, 그 외 HTML은 모두 이스케이프
            function escMultiline(s) {
              var withBreaks = String(s == null ? '' : s).replace(/<br\s*\/?>/gi, '\n');
              return esc(withBreaks).replace(/\n/g, '<br>');
            }

            // 모바일에서만 자동 슬라이드 회전 + 프로그레스 바 갱신
            function startAutoSlide() {
              if (!grid) return;
              var progressFill = document.querySelector('#projects-progress .projects__progress-fill');
              var timer = null;
              var PAUSE_AFTER_USER = 6000;   // 사용자 인터랙션 후 일시정지 시간
              var INTERVAL = 3500;            // 자동 슬라이드 간격
              var userPausedUntil = 0;

              function isMobile() {
                return window.matchMedia('(max-width: 640px)').matches;
              }
              function cards() {
                return grid.querySelectorAll('.product-card');
              }
              function currentIndex() {
                var list = cards();
                if (!list.length) return 0;
                var cardW = list[0].offsetWidth + 14;  // gap 14 포함
                return Math.round(grid.scrollLeft / cardW);
              }
              function totalCount() {
                return cards().length;
              }
              function updateProgress() {
                if (!progressFill) return;
                var total = totalCount();
                if (!total) { progressFill.style.width = '0%'; return; }
                // (현재 인덱스 + 1) / 전체 비율로 차오름
                var pct = ((currentIndex() + 1) / total) * 100;
                progressFill.style.width = Math.max(0, Math.min(100, pct)) + '%';
              }
              function goTo(i) {
                var list = cards();
                if (!list.length) return;
                var max = list.length - 1;
                if (i > max) i = 0;        // 끝에 도달하면 처음으로
                if (i < 0) i = max;
                var cardW = list[0].offsetWidth + 14;
                grid.scrollTo({ left: cardW * i, behavior: 'smooth' });
              }
              function tick() {
                if (!isMobile()) return;
                if (Date.now() < userPausedUntil) return;
                if (document.hidden) return;
                var rect = grid.getBoundingClientRect();
                var inView = rect.bottom > 0 && rect.top < window.innerHeight;
                if (!inView) return;
                goTo(currentIndex() + 1);
              }
              function start() {
                stop();
                updateProgress();
                if (!isMobile()) return;
                timer = setInterval(tick, INTERVAL);
              }
              function stop() {
                if (timer) { clearInterval(timer); timer = null; }
              }
              function pauseFromUser() {
                userPausedUntil = Date.now() + PAUSE_AFTER_USER;
              }

              // 손가락 스크롤/터치 시 일시정지
              grid.addEventListener('touchstart', pauseFromUser, { passive: true });
              grid.addEventListener('pointerdown', pauseFromUser);
              grid.addEventListener('wheel', pauseFromUser, { passive: true });

              // 스크롤 위치 바뀔 때마다 프로그레스 바 동기화 (자동 + 수동 모두 반영)
              var rafId = null;
              grid.addEventListener('scroll', function () {
                if (rafId) return;
                rafId = requestAnimationFrame(function () {
                  rafId = null;
                  updateProgress();
                });
              }, { passive: true });

              window.addEventListener('resize', function () {
                start();
                updateProgress();
              });

              start();
            }
          })();
        </script>

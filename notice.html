<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="keywords" content="러스틱꼴라주 공지사항, Rustic Collage news, 마루 브랜드 소식" />
    <meta name="robots" content="index, follow" />

    <link rel="canonical" href="https://rusticcollage.com/notice.html" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rustic Collage" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:title" content="Notice — Rustic Collage" />
    <meta property="og:description" content="Rustic Collage 공지사항 — 신제품 소식, 휴무 안내, 인증서 등 브랜드의 최신 소식." />
    <meta property="og:url" content="https://rusticcollage.com/notice.html" />
    <meta property="og:image" content="https://rusticcollage.com/images/OG_favicon/og.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Notice — Rustic Collage" />
    <meta name="twitter:description" content="Rustic Collage 공지사항 — 브랜드의 최신 소식." />
    <meta name="twitter:image" content="https://rusticcollage.com/images/OG_favicon/og.png" />

    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css"
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="./components.js"></script>
  </head>
  <body class="subpage subpage--light">
    <rc-nav></rc-nav>

    <main id="top">
      <!-- ======================== PAGE HEADER + CATEGORY TABS ======================== -->
      <section class="notice-page-hero">
        <div class="container">
          <div class="notice-page-hero__row">
            <h1 class="notice-page-hero__title" data-rc-anim="01">Notice</h1>
            <nav class="notice-tabs" role="tablist" aria-label="카테고리">
              <button type="button" class="notice-tabs__tab is-active" data-filter="all" role="tab" aria-selected="true">전체</button>
              <span class="notice-tabs__sep" aria-hidden="true">|</span>
              <button type="button" class="notice-tabs__tab" data-filter="notice" role="tab" aria-selected="false">NOTICE</button>
              <span class="notice-tabs__sep" aria-hidden="true">|</span>
              <button type="button" class="notice-tabs__tab" data-filter="news" role="tab" aria-selected="false">NEWS</button>
              <span class="notice-tabs__sep" aria-hidden="true">|</span>
              <button type="button" class="notice-tabs__tab" data-filter="certifications" role="tab" aria-selected="false">CERTIFICATIONS</button>
            </nav>
          </div>
        </div>
      </section>

      <!-- ======================== BOARD TABLE ======================== -->
      <section class="notice-page-list">
        <div class="container">
          <div class="notice-table" role="table" aria-label="공지사항 목록">
            <div class="notice-table__head" role="row">
              <div class="notice-cell notice-cell--num" role="columnheader">번호</div>
              <div class="notice-cell notice-cell--title" role="columnheader">제목</div>
              <div class="notice-cell notice-cell--date" role="columnheader">작성일</div>
            </div>
            <div class="notice-table__body" id="notice-tbody">
              <div class="notice-loading">불러오고 있어요…</div>
            </div>
          </div>
          <p class="notice-empty" id="notice-empty" hidden>해당 카테고리에 등록된 글이 없습니다.</p>
        </div>
      </section>

      <script>
        (function () {
          var tabs = document.querySelectorAll('.notice-tabs__tab');
          var tbody = document.getElementById('notice-tbody');
          var emptyMsg = document.getElementById('notice-empty');
          var ALL_ITEMS = [];

          function esc(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
              return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
            });
          }

          function formatDate(s) {
            // 이미 YYYY-MM-DD 형태면 그대로
            return esc(s || '');
          }

          function render(filter) {
            tbody.innerHTML = '';
            var filtered = ALL_ITEMS.filter(function (it) {
              return filter === 'all' || it.category === filter;
            });
            if (filtered.length === 0) {
              if (emptyMsg) emptyMsg.hidden = false;
              return;
            }
            if (emptyMsg) emptyMsg.hidden = true;

            var pinned = filtered.filter(function (it) { return !!it.isPinned; }).sort(byDateDesc);
            var normal = filtered.filter(function (it) { return !it.isPinned; }).sort(byDateDesc);

            var html = '';
            pinned.forEach(function (it) { html += rowHTML(it, '공지'); });
            normal.forEach(function (it, i) { html += rowHTML(it, String(normal.length - i)); });
            tbody.innerHTML = html;
          }

          function byDateDesc(a, b) {
            return String(b.date || '').localeCompare(String(a.date || ''));
          }

          function rowHTML(it, numLabel) {
            var href = './notice-detail.html?id=' + encodeURIComponent(it.id || '');
            var cls = 'notice-row' + (it.isPinned ? ' notice-row--pinned' : '');
            return (
              '<a class="' + cls + '" role="row" href="' + href + '">' +
                '<div class="notice-cell notice-cell--num" role="cell">' + esc(numLabel) + '</div>' +
                '<div class="notice-cell notice-cell--title" role="cell">' +
                  '<span class="notice-title">' + esc(it.title || '') + '</span>' +
                '</div>' +
                '<div class="notice-cell notice-cell--date" role="cell">' + formatDate(it.date) + '</div>' +
              '</a>'
            );
          }

          fetch('./notice-data.json?t=' + Date.now())
            .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(function (data) {
              ALL_ITEMS = data.items || [];
              render('all');
            })
            .catch(function (err) {
              tbody.innerHTML = '<div class="notice-loading">목록을 불러오지 못했습니다.</div>';
              console.error(err);
            });

          tabs.forEach(function (tab) {
            tab.addEventListener('click', function () {
              tabs.forEach(function (t) {
                t.classList.remove('is-active');
                t.setAttribute('aria-selected', 'false');
              });
              tab.classList.add('is-active');
              tab.setAttribute('aria-selected', 'true');
              render(tab.getAttribute('data-filter') || 'all');
            });
          });
        })();
      </script>
    </main>

    <rc-footer></rc-footer>

    <script src="./app.js"></script>
  </body>
</html>

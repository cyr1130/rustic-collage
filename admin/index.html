<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>프로젝트 관리 — Rustic Collage</title>
    <meta name="robots" content="noindex, nofollow" />

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css"
    />

    <style>
      :root {
        --blue-50:  #F4F9FF;
        --blue-100: #E8F3FF;
        --blue-200: #C9DEFD;
        --blue-500: #3182F6;
        --blue-600: #1B64DA;

        --gray-50:  #F9FAFB;
        --gray-100: #F2F4F6;
        --gray-200: #E5E8EB;
        --gray-300: #D1D6DB;
        --gray-400: #B0B8C1;
        --gray-500: #8B95A1;
        --gray-600: #6B7684;
        --gray-700: #4E5968;
        --gray-800: #333D4B;
        --gray-900: #191F28;

        --green-bg: #E6F9EE;
        --green-fg: #00875A;
        --red-bg:   #FFEAEA;
        --red-fg:   #D14343;
        --yellow-bg: #FFF6D9;
        --yellow-fg: #8A6A00;

        --radius-xs: 6px;
        --radius-sm: 8px;
        --radius: 12px;
        --radius-lg: 16px;
        --radius-xl: 20px;
        --radius-pill: 999px;

        --sidebar-w: 240px;
        --topbar-h: 64px;
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        background: #ffffff;
        color: var(--gray-900);
        font-family: 'Pretendard Variable', 'Pretendard', system-ui, -apple-system, sans-serif;
        font-size: 15px;
        line-height: 1.55;
        letter-spacing: -0.02em;
        -webkit-font-smoothing: antialiased;
        word-break: keep-all;
      }
      a { color: inherit; text-decoration: none; }
      button { font: inherit; cursor: pointer; }
      code {
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-size: 0.88em; background: var(--gray-100);
        padding: 2px 6px; border-radius: 4px; color: var(--gray-800);
      }

      /* ---------- Top bar ---------- */
      .topbar {
        position: sticky; top: 0; z-index: 30;
        height: var(--topbar-h);
        background: rgba(242, 244, 246, 0.85);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border-bottom: 1px solid var(--gray-200);
      }
      .topbar__inner {
        height: 100%;
        margin: 0;
        padding: 0 24px;
        display: flex; align-items: center; justify-content: space-between;
        gap: 16px;
      }
      .topbar__left { display: flex; align-items: center; gap: 12px; min-width: 0; }
      .topbar__title {
        font-size: 17px; font-weight: 700;
        margin: 0; color: var(--gray-900);
        letter-spacing: -0.03em;
      }

      .save-status {
        font-size: 12px; font-weight: 500;
        display: inline-flex; align-items: center; gap: 6px;
        padding: 5px 12px; border-radius: var(--radius-pill);
        background: var(--gray-100); color: var(--gray-600);
        white-space: nowrap;
        transition: background 200ms ease, color 200ms ease;
      }
      .save-status::before {
        content: ''; width: 6px; height: 6px; border-radius: 50%;
        background: var(--gray-400);
      }
      .save-status[data-state="dirty"]    { background: var(--yellow-bg); color: var(--yellow-fg); }
      .save-status[data-state="dirty"]::before { background: #D4A017; }
      .save-status[data-state="saving"]   { background: var(--blue-100); color: var(--blue-600); }
      .save-status[data-state="saving"]::before { background: var(--blue-500); animation: pulse 1s infinite; }
      .save-status[data-state="saved"]    { background: var(--green-bg); color: var(--green-fg); }
      .save-status[data-state="saved"]::before { background: var(--green-fg); }
      .save-status[data-state="error"]    { background: var(--red-bg); color: var(--red-fg); }
      .save-status[data-state="error"]::before { background: var(--red-fg); }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

      .topbar__actions { display: flex; gap: 8px; flex-wrap: wrap; }

      .btn {
        height: 40px; padding: 0 18px;
        border-radius: var(--radius-sm); border: 0;
        background: var(--gray-100); color: var(--gray-800);
        font-size: 14px; font-weight: 600;
        letter-spacing: -0.02em;
        transition: background 160ms ease, transform 160ms ease;
        display: inline-flex; align-items: center; gap: 6px;
      }
      .btn:active:not(:disabled) { transform: scale(0.98); }
      .btn--primary { background: var(--blue-500); color: #fff; }
      .btn--primary:hover:not(:disabled) { background: var(--blue-600); }
      .btn--ghost { background: var(--gray-100); color: var(--gray-700); }
      .btn--ghost:hover:not(:disabled) { background: var(--gray-200); }
      /* 뒤로가기 버튼: 좌측 화살표가 시각적으로 좌측 패딩을 더 비어보이게 만드는 점 보정 */
      .btn--back {
        padding: 0 18px 0 14px;
        gap: 8px;
      }
      .btn--text { background: transparent; color: var(--gray-700); }
      .btn--text:hover:not(:disabled) { background: var(--gray-100); }
      .btn:disabled { opacity: 0.45; cursor: not-allowed; }
      .btn--small { height: 34px; padding: 0 14px; font-size: 13px; }

      .kbd {
        display: inline-flex; align-items: center;
        font-size: 10px; font-weight: 600;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        opacity: 0.55;
      }

      /* ---------- Layout (sidebar + content) ---------- */
      .layout {
        display: grid;
        grid-template-columns: var(--sidebar-w) 1fr;
        margin: 0;
        min-height: calc(100vh - var(--topbar-h));
      }

      .sidebar {
        position: sticky;
        top: var(--topbar-h);
        align-self: start;
        height: calc(100vh - var(--topbar-h));
        padding: 24px 16px;
        border-right: 1px solid var(--gray-200);
        background: var(--gray-100);
      }
      .sidebar__group { margin-bottom: 20px; }
      .sidebar__group-title {
        font-size: 11px; font-weight: 700;
        color: var(--gray-500);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 0 12px 8px;
      }
      .sidebar__item {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 12px;
        border-radius: var(--radius-sm);
        color: var(--gray-700);
        font-size: 14px; font-weight: 500;
        cursor: pointer;
        background: transparent;
        border: 0;
        width: 100%;
        text-align: left;
        transition: background 160ms ease, color 160ms ease;
      }
      .sidebar__item:hover { background: var(--gray-100); color: var(--gray-900); }
      .sidebar__item.is-active {
        background: var(--blue-100); color: var(--blue-600);
      }
      .sidebar__item .icon {
        width: 18px; height: 18px;
        display: inline-flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .sidebar__item .badge {
        margin-left: auto;
        font-size: 11px; font-weight: 600;
        padding: 2px 8px;
        background: var(--gray-100); color: var(--gray-700);
        border-radius: var(--radius-pill);
      }
      .sidebar__item.is-active .badge {
        background: rgba(255, 255, 255, 0.6); color: var(--blue-600);
      }

      .content {
        padding: 32px 32px 120px;
        min-width: 0;
        background: #ffffff;
      }
      .content__title {
        font-size: 22px; font-weight: 700;
        margin: 0 0 4px;
        color: var(--gray-900);
        letter-spacing: -0.03em;
      }
      .content__subtitle {
        font-size: 14px; color: var(--gray-600);
        margin: 0 0 24px;
      }

      /* ---------- View switcher ---------- */
      .view { display: none; }
      .view.is-active { display: block; }

      /* ---------- Tip banner ---------- */
      .tip {
        background: var(--blue-50);
        border: 1px solid var(--blue-100);
        border-radius: var(--radius);
        padding: 14px 18px;
        margin: 0 0 20px;
        display: flex; gap: 10px;
        font-size: 14px; line-height: 1.5;
        color: var(--gray-800);
      }
      .tip__icon {
        flex-shrink: 0; width: 18px; height: 18px;
        border-radius: 50%; background: var(--blue-500);
        color: #fff;
        display: inline-flex; align-items: center; justify-content: center;
        font-size: 11px; font-weight: 700;
        line-height: 1;
        /* 첫 줄(strong, 16px font / 24px line) 중앙에 정렬: (24-18)/2 = 3px */
        margin-top: 3px;
      }
      .tip strong { font-size: 16px; color: var(--gray-900); font-weight: 700;}
      .tip kbd {
        display: inline-block;
        font-size: 11px; padding: 1px 6px;
        background: #fff; border: 1px solid var(--gray-300);
        border-radius: 4px; font-family: ui-monospace, Menlo, Consolas, monospace;
        color: var(--gray-800);
      }

      .summary-bar {
        display: flex; align-items: center; justify-content: space-between;
        gap: 12px; margin: 0 0 14px;
      }
      .summary-bar__count {
        font-size: 14px; color: var(--gray-700); font-weight: 500;
      }
      .summary-bar__count strong { color: var(--gray-900); font-weight: 700; }
      .summary-bar__actions { display: flex; gap: 4px; }

      /* ---------- Project card (list) ---------- */
      .proj {
        background: #f9fafb;
        border-radius: var(--radius-lg);
        border: 1px solid #ffffff;
        padding: 16px 18px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: border-color 200ms ease, box-shadow 200ms ease, background 200ms ease;
      }
      .proj:hover {
        border: 1px solid var(--gray-300);
        background: #f3f5f7;
      }
      .proj__head { display: flex; align-items: center; gap: 14px; }
      .proj__thumb {
        width: 56px; height: 56px;
        border-radius: var(--radius-sm);
        background: var(--gray-100);
        object-fit: cover; flex-shrink: 0;
      }
      .proj__head-text { flex: 1; min-width: 0; cursor: pointer; }
      .proj__name {
        font-size: 15px; font-weight: 700;
        margin: 0 0 2px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        color: var(--gray-900);
      }
      .proj__id {
        font-size: 12px; color: var(--gray-500);
        font-family: ui-monospace, Menlo, Consolas, monospace;
      }
      .proj__actions { display: flex; gap: 4px; flex-shrink: 0; }

      .icon-btn {
        width: 38px; height: 38px; padding: 0;
        color: black;
        background: transparent; border: 0;
        border-radius: var(--radius-sm); color: var(--gray-600);
        font-size: 20px; font-weight: 500;
        line-height: 1;
        display: inline-flex; align-items: center; justify-content: center;
        transition: background 160ms ease, color 160ms ease;
      }
      .icon-btn:hover:not(:disabled) { background: var(--gray-100); color: var(--gray-900); }
      .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }
      .icon-btn--danger:hover:not(:disabled) { background: var(--red-bg); color: var(--red-fg); }
      .icon-btn--accent:hover:not(:disabled) { background: var(--blue-100); color: var(--blue-600); }

      /* ---------- Search bar ---------- */
      .search-bar {
        position: relative;
        flex: 1; max-width: 320px;
      }
      .search-bar input {
        width: 100%; height: 36px;
        padding: 0 14px 0 36px;
        border: 1px solid var(--gray-300);
        border-radius: var(--radius-pill);
        background: #fff;
        font: inherit; font-size: 13px;
        color: var(--gray-900);
        transition: border-color 160ms ease, box-shadow 160ms ease;
      }
      .search-bar input:hover { border-color: var(--gray-400); }
      .search-bar input::placeholder { color: var(--gray-400); }
      .search-bar input:focus {
        outline: none;
        border-color: var(--blue-500);
        box-shadow: 0 0 0 3px var(--blue-100);
      }
      .search-bar svg {
        position: absolute; left: 12px; top: 50%;
        transform: translateY(-50%);
        color: var(--gray-400);
        pointer-events: none;
      }

      /* ---------- Detail / Edit view ---------- */
      .detail-header {
        display: flex; align-items: center; gap: 12px;
        margin-bottom: 24px;
        padding-bottom: 20px;
      }
      .detail-header__title {
        flex: 1; min-width: 0;
        margin: 0;
        font-size: 22px; font-weight: 700;
        letter-spacing: -0.03em;
        color: var(--gray-900);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .detail-header__actions { display: flex; gap: 8px; flex-shrink: 0; }
      .btn--danger {
        background: #fff;
        color: var(--red-fg);
        border: 1px solid #FECACA;
      }
      .btn--danger:hover:not(:disabled) {
        background: #FEF2F2;
        border-color: #FCA5A5;
      }

      /* 보기 모드(read-only) 표시 */
      .view-row {
        padding: 16px 0;
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: 24px;
        align-items: flex-start;
      }
      .view-row:last-child { border-bottom: 0; }
      .view-row__label {
        font-size: 13px; font-weight: 600;
        color: var(--gray-600);
        padding-top: 4px;
      }
      .view-row__value {
        font-size: 14px; line-height: 1.7;
        color: var(--gray-900);
        white-space: pre-wrap; word-break: break-word;
      }
      .view-row__value--muted { color: var(--gray-400); font-style: italic; }
      .view-row__image {
        width: 120px; height: 120px;
        border-radius: var(--radius-sm);
        object-fit: cover;
        background: var(--gray-100);
      }
      .view-row__gallery {
        display: flex; flex-wrap: wrap; gap: 10px;
      }
      .view-row__gallery img {
        width: 120px; height: 120px;
        border-radius: var(--radius-sm);
        object-fit: cover;
        background: var(--gray-100);
      }

      @media (max-width: 720px) {
        .view-row { grid-template-columns: 1fr; gap: 6px; }
        .detail-header { flex-direction: column; align-items: stretch; }
        .detail-header__actions { justify-content: flex-end; }
      }

      /* ---------- Form card (Add new) ---------- */
      .form-card {
        background: #ffff;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-lg);
        padding: 28px;
      }
      .form-card__footer {
        display: flex; gap: 8px; justify-content: flex-end;
        margin-top: 24px; padding-top: 24px;
        border-top: 1px solid var(--gray-200);
      }
      /* 폼 섹션 구분선 (HOME / Detail Page) */
      .form-section {
        height: 0;
        margin: 36px 0;
        border-top: 1px solid var(--gray-300);
      }

      /* ---------- Field ---------- */
      .field { margin-bottom: 16px; }
      .field:last-child { margin-bottom: 0; }
      .label {
        display: flex; align-items: baseline; justify-content: space-between;
        font-size: 13px; font-weight: 600; color: var(--gray-800);
        margin-bottom: 8px; gap: 8px;
      }
      .label__hint { color: var(--gray-500); font-weight: 500; font-size: 12px; }
      .input, .textarea {
        width: 100%; padding: 12px 14px;
        font-family: inherit; font-size: 14px;
        color: var(--gray-900); background: #fff;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-sm);
        letter-spacing: -0.02em;
        transition: border-color 160ms ease, background 160ms ease;
      }
      .input::placeholder, .textarea::placeholder { color: var(--gray-400); }
      .input:hover, .textarea:hover { border-color: var(--gray-300); }
      .input:focus, .textarea:focus {
        outline: none;
        border-color: var(--blue-500);
        background: var(--blue-50);
      }
      .input--mono { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 13px; }
      .textarea { resize: vertical; min-height: 76px; line-height: 1.55; }

      /* ---------- Image input ---------- */
      .img-input {
        display: flex; gap: 10px; align-items: center;
        position: relative;
        border: 1px dashed transparent; border-radius: var(--radius-md);
        padding: 4px; margin: -4px;
        transition: border-color .15s ease, background .15s ease;
      }
      .img-input--dragover {
        border-color: var(--blue-500);
        background: rgba(49, 130, 246, 0.06);
      }
      .img-input--dragover::after {
        content: '여기에 드롭하세요';
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        font-size: 13px; font-weight: 600; color: var(--blue-500);
        background: rgba(255,255,255,0.85); border-radius: var(--radius-md);
        pointer-events: none;
      }
      .img-input__preview {
        width: 56px; height: 56px;
        border-radius: var(--radius-sm); background: var(--gray-100);
        object-fit: cover; display: block; flex-shrink: 0;
      }
      .img-input .input { flex: 1; }

      .gallery-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
      .gallery-add {
        background: var(--gray-50);
        border: 1px dashed var(--gray-300);
        color: var(--gray-600);
        padding: 12px;
        width: 100%;
        border-radius: var(--radius-sm);
        font-size: 13px; font-weight: 500;
        cursor: pointer;
        transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
      }
      .gallery-add:hover {
        background: var(--blue-50); color: var(--blue-600); border-color: var(--blue-200);
      }

      /* ---------- Inline SVG 아이콘 ---------- */
      .icon-btn svg { width: 20px; height: 20px; display: block; }
      .sidebar__item svg,
      .btn svg,
      .upload-btn svg {
        flex-shrink: 0;
      }

      /* ---------- Upload button ---------- */
      .upload-btn {
        flex-shrink: 0;
        display: inline-flex; align-items: center; gap: 5px;
        padding: 0 12px; height: 36px;
        background: var(--blue-50); color: var(--blue-600);
        border: 1px solid var(--blue-100);
        border-radius: var(--radius-sm);
        font-size: 12px; font-weight: 600;
        cursor: pointer;
        transition: background 160ms ease, color 160ms ease;
      }
      .upload-btn:hover:not(:disabled) {
        background: var(--blue-500); color: #fff; border-color: var(--blue-500);
      }
      .upload-btn:disabled { opacity: 0.55; cursor: not-allowed; }
      .upload-btn svg { width: 13px; height: 13px; }

      /* ---------- Toast (사용 안 함, 레거시 호환용) ---------- */
      .toast { display: none; }

      /* ---------- Modal (중앙 다이얼로그) ---------- */
      .modal {
        position: fixed; inset: 0;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
        display: none; align-items: center; justify-content: center;
        z-index: 200;
        padding: 24px;
        animation: modalFadeIn 180ms ease;
      }
      .modal.is-show { display: flex; }
      @keyframes modalFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .modal__card {
        width: 100%; max-width: 290px;
        background: #fff;
        border-radius: 24px;
        /* SVG 디자인 매칭: top 44 / 가로 21 / bottom 21 */
        padding: 40px 20px 19px;
        box-shadow: 0 -16px 80px rgba(0, 27, 55, 0.10), 0 4px 24px rgba(0, 27, 55, 0.06);
        text-align: center;
        animation: modalScaleIn 220ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes modalScaleIn {
        from { opacity: 0; transform: translateY(8px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .modal__title {
        margin: 0 0 8px;
        font-size: 16px; font-weight: 600;
        color: #191F28;
        letter-spacing: -0.03em;
        line-height: 22px;
        white-space: pre-line; word-break: keep-all;
      }
      /* 디스크립션이 없을 때 타이틀↔버튼 간격을 30px로 (SVG 매칭) */
      .modal__title--no-desc { margin-bottom: 30px; }
      .modal__desc {
        margin: 0 0 30px;
        font-size: 16px; line-height: 22px;
        color: #191F28;
        white-space: pre-line; word-break: keep-all;
      }
      .modal__desc:empty { display: none; }
      .modal__actions {
        display: flex; gap: 6px;
      }
      .modal__btn {
        flex: 1;
        height: 44px;
        border: 0; border-radius: 12px;
        font: inherit; font-size: 15px; font-weight: 600;
        letter-spacing: -0.02em;
        cursor: pointer;
        transition: background 160ms ease, color 160ms ease;
      }
      .modal__btn--primary {
        background: var(--blue-500); color: #fff;
      }
      .modal__btn--primary:hover { background: var(--blue-600); }
      .modal__btn--secondary {
        background: #F3F4F5; color: #898B8D;
      }
      .modal__btn--secondary:hover { background: #E8EAEB; color: #6B7280; }
      /* danger도 동일한 파랑 사용 (TDS 톤) — 위험 신호는 본문 텍스트로만 전달 */
      .modal__btn--danger {
        background: var(--blue-500); color: #fff;
      }
      .modal__btn--danger:hover { background: var(--blue-600); }

      /* ---------- Login overlay ---------- */
      .login {
        position: fixed; inset: 0;
        background: rgba(242, 244, 246, 0.96);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none; align-items: center; justify-content: center;
        z-index: 50; padding: 24px;
      }
      .login.is-show { display: flex; }
      .login__card {
        width: 100%; max-width: 400px;
        background: #fff;
        border-radius: var(--radius-xl);
        padding: 32px;
        box-shadow: 0 12px 32px rgba(0,0,0,0.08);
      }
      .login__title { margin: 0 0 8px; font-size: 20px; font-weight: 700; color: var(--gray-900); letter-spacing: -0.03em; }
      .login__hint { margin: 0 0 24px; font-size: 14px; color: var(--gray-600); line-height: 1.6; }
      .login__error { color: var(--red-fg); font-size: 13px; margin: 10px 0 0; font-weight: 500; }
      .login .btn { width: 100%; height: 48px; font-size: 15px; }

      /* ---------- Empty / Loading ---------- */
      .empty {
        text-align: center; padding: 80px 20px;
        color: var(--gray-500); font-size: 15px;
        background: #fff;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-lg);
      }
      .empty__title { color: var(--gray-800); font-weight: 700; font-size: 17px; margin: 0 0 6px; }
      .empty p { margin: 0; }
      .loading {
        display: flex; align-items: center; justify-content: center;
        padding: 100px 20px; color: var(--gray-500); font-size: 14px; font-weight: 500;
        background: #fff;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-lg);
      }

      /* ---------- Responsive ---------- */
      @media (max-width: 880px) {
        body::before { display: none; }
        .layout { grid-template-columns: 1fr; }
        .sidebar {
          position: static;
          height: auto;
          padding: 12px;
          border-right: 0;
          border-bottom: 1px solid var(--gray-200);
          display: flex;
          flex-direction: column;
          gap: 4px;
        }
        .sidebar__group { display: contents; }
        .sidebar__group-title { display: none; }
        .sidebar__group:first-child .sidebar__group-title { display: none; }
        .sidebar__item { padding: 10px 14px; }
        .content { padding: 24px 18px 100px; }
        .topbar__inner { padding: 0 18px; }
        .topbar__title { font-size: 15px; }
        .save-status { display: none; }
        .btn { height: 38px; padding: 0 14px; font-size: 13px; }
        .kbd { display: none; }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <div class="topbar__left">
          <h1 class="topbar__title">프로젝트 관리</h1>
          <span class="save-status" id="save-status" data-state="idle">동기화됨</span>
        </div>
        <div class="topbar__actions">
          <button class="btn btn--ghost" id="btn-reload" title="서버에서 다시 불러오기">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 0115.5-6.3M21 4v5h-5M21 12a9 9 0 01-15.5 6.3M3 20v-5h5"/></svg>
            <span>새로고침</span>
          </button>
          <a class="btn btn--ghost" href="../projects.html" target="_blank" rel="noopener">
            <span>사이트 보기</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 17L17 7M9 7h8v8"/></svg>
          </a>
          <button class="btn btn--primary" id="btn-save" title="저장 (⌘+S / Ctrl+S)">
            <span id="btn-save-label">저장하고 게시</span>
          </button>
        </div>
      </div>
    </header>

    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar__group">
          <p class="sidebar__group-title">프로젝트</p>
          <button class="sidebar__item is-active" data-view="list" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            <span>프로젝트 목록</span>
            <span class="badge" id="sidebar-count">0</span>
          </button>
          <button class="sidebar__item" data-view="add" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
            <span>신규 등록</span>
          </button>
        </div>
      </aside>

      <!-- Content -->
      <main class="content">
        <!-- View: List -->
        <section class="view is-active" data-view="list">
          <h2 class="content__title">프로젝트 목록</h2>
          <p class="content__subtitle">등록된 프로젝트를 확인하고 편집할 수 있어요.</p>

          <div class="tip">
            <span class="tip__icon">!</span>
            <div>
              <strong>편집 팁이에요</strong><br />
              카드를 클릭하면 상세 페이지로 이동해요. 저장하고 게시를 누르면 저장 후 30~60초 안에 사이트에 반영돼요.
            </div>
          </div>

          <div class="summary-bar">
            <span class="summary-bar__count">총 <strong id="proj-count">0</strong>개의 프로젝트</span>
            <div class="search-bar">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="7" />
                <path d="m20 20-3.5-3.5" />
              </svg>
              <input type="search" id="search-input" placeholder="프로젝트 이름으로 검색" autocomplete="off" />
            </div>
          </div>

          <div id="projects-list">
            <div class="loading">불러오고 있어요…</div>
          </div>
        </section>

        <!-- View: Detail / Edit -->
        <section class="view" data-view="detail">
          <div id="detail-host"></div>
        </section>

        <!-- View: Add new -->
        <section class="view" data-view="add">
          <h2 class="content__title">신규 프로젝트 등록</h2>
          <p class="content__subtitle">신규 프로젝트를 목록에 추가합니다. 목록 추가하고 저장하고 게시를 눌러주세요</p>

          <div class="form-card" id="add-form-host">
            <!-- 폼 필드는 JS로 렌더링 -->
          </div>

          <div class="form-card__footer" style="background:transparent;border:0;padding:16px 0 0;">
            <button class="btn btn--ghost" id="btn-add-reset" type="button">초기화</button>
            <button class="btn btn--primary" id="btn-add-submit" type="button">+ 목록에 추가하기</button>
          </div>
        </section>
      </main>
    </div>

    <div class="login" id="login">
      <form class="login__card" id="login-form">
        <p class="login__title">관리자 로그인</p>
        <p class="login__hint">Vercel에 등록한 <code>ADMIN_PASSWORD</code> 비밀번호를 입력해 주세요.</p>
        <div class="field">
          <label class="label">비밀번호</label>
          <input type="password" class="input" id="login-password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn--primary">로그인</button>
        <p class="login__error" id="login-error" hidden></p>
      </form>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Modal (중앙 다이얼로그) -->
    <div class="modal" id="modal" aria-hidden="true">
      <div class="modal__card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h3 class="modal__title" id="modal-title"></h3>
        <p class="modal__desc" id="modal-desc"></p>
        <div class="modal__actions" id="modal-actions"></div>
      </div>
    </div>

    <script>
      'use strict';

      var STATE = { projects: [] };
      var SAVED_SNAPSHOT = '';
      var SESSION_KEY = 'rc_admin_pw';
      var DRAFT = blankProject();
      var EDITING_INDEX = null;     // 상세/편집 페이지에서 보고 있는 프로젝트 인덱스
      var EDIT_MODE = 'view';       // 'view' | 'edit'
      var SEARCH_QUERY = '';

      // 모든 아이콘은 인라인 SVG로 렌더링 (mask-image 의존 X — file://에서도 정상)
      var ICONS = {
        up: '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M3.9 15.375a1.5 1.5 0 01.396-1.017l6.75-6.75a1.5 1.5 0 012.121 0l6.75 6.75a1.5 1.5 0 11-2.122 2.121L12 10.535l-5.795 5.795A1.5 1.5 0 013.9 15.375z"/></svg>',
        down: '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M3.9 8.625A1.5 1.5 0 016.195 7.665L12 13.47l5.79-5.805a1.5 1.5 0 112.122 2.122l-6.75 6.75a1.5 1.5 0 01-2.121 0l-6.75-6.75a1.5 1.5 0 01-.391-.962z"/></svg>',
        copy: '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M19.1 8.3H17.5v2.4h1.6c.7 0 1.2.5 1.2 1.2v7.2c0 .7-.5 1.2-1.2 1.2h-7.2c-.7 0-1.2-.5-1.2-1.2v-1.4H8.3v1.4c0 2 1.6 3.6 3.6 3.6h7.2c2 0 3.6-1.6 3.6-3.6v-7.2c0-2-1.6-3.6-3.6-3.6z"/><path fill-rule="evenodd" clip-rule="evenodd" d="M4.9 3.7c-.7 0-1.2.5-1.2 1.2v7.2c0 .7.5 1.2 1.2 1.2h7.2c.7 0 1.2-.5 1.2-1.2V4.9c0-.7-.5-1.2-1.2-1.2H4.9zm7.2 12H4.9c-2 0-3.6-1.6-3.6-3.6V4.9c0-2 1.6-3.6 3.6-3.6h7.2c2 0 3.6 1.6 3.6 3.6v7.2c0 2-1.6 3.6-3.6 3.6z"/></svg>',
        x: '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M13.815 12l5.651-5.651a1.5 1.5 0 10-2.122-2.121L11.7 9.879 6.05 4.227a1.5 1.5 0 10-2.122 2.122L9.578 12l-5.651 5.651a1.5 1.5 0 102.121 2.121l5.652-5.651 5.651 5.651a1.5 1.5 0 102.121-2.121L13.815 12z"/></svg>',
        plus: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg"><path d="M12 5v14M5 12h14"/></svg>',
        list: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg"><path d="M4 6h16M4 12h16M4 18h16"/></svg>',
        refresh: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M3 12a9 9 0 0115.5-6.3M21 4v5h-5M21 12a9 9 0 01-15.5 6.3M3 20v-5h5"/></svg>',
        extUp: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M7 17L17 7M9 7h8v8"/></svg>',
        upload: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M12 16V4M6 10l6-6 6 6M4 20h16"/></svg>',
      };

      function $(s, r) { return (r || document).querySelector(s); }
      function $all(s, r) { return Array.prototype.slice.call((r || document).querySelectorAll(s)); }
      function el(tag, attrs, children) {
        var n = document.createElement(tag);
        if (attrs) Object.keys(attrs).forEach(function (k) {
          if (attrs[k] == null) return;
          if (k === 'class') n.className = attrs[k];
          else if (k === 'text') n.textContent = attrs[k];
          else if (k === 'html') n.innerHTML = attrs[k];
          else n.setAttribute(k, attrs[k]);
        });
        if (children) children.forEach(function (c) {
          if (c == null) return;
          if (typeof c === 'string') n.appendChild(document.createTextNode(c));
          else n.appendChild(c);
        });
        return n;
      }
      function snapshot() {
        return JSON.stringify(STATE.projects.map(function (p) {
          var clean = {};
          Object.keys(p).forEach(function (k) { if (k.charAt(0) !== '_') clean[k] = p[k]; });
          return clean;
        }));
      }
      function isDirty() { return snapshot() !== SAVED_SNAPSHOT; }
      function slugify(s) {
        return String(s || '').toLowerCase().trim()
          .replace(/[^\w\s-]/g, '')
          .replace(/[\s_]+/g, '-')
          .replace(/-+/g, '-')
          .replace(/^-+|-+$/g, '');
      }
      function uniqueId(base, existing) {
        var s = slugify(base) || 'project';
        var id = s, i = 1;
        while (existing.indexOf(id) !== -1) { i += 1; id = s + '-' + i; }
        return id;
      }
      function blankProject() {
        return {
          id: '', name: '',
          // HOME / 썸네일 영역
          thumbnail: '', thumbnailTitle: '', thumbnailDesc: '',
          // Detail Page 영역
          title: '', description: '', details: '', size: '',
          gallery: ['', '', ''],
          _idEdited: false,
          _thumbTitleEdited: false,
          _titleEdited: false,
        };
      }

      function updateStatus() {
        var status = $('#save-status');
        if (!status) return;
        var s = status.dataset.state;
        if (s === 'saving' || s === 'saved' || s === 'error') return;
        var dirty = isDirty();
        status.dataset.state = dirty ? 'dirty' : 'idle';
        status.textContent = dirty ? '저장 안 됨' : '동기화됨';
      }
      function setStatus(state, text) {
        var status = $('#save-status');
        status.dataset.state = state;
        status.textContent = text;
      }

      // 레거시 호환용 — 사용처 거의 없음
      function toast() { /* no-op: 모달로 통합됨 */ }

      // ---------- Modal helpers ----------
      // 안내문 끝의 마침표(들) 제거 — 디자인 가이드: 모달 본문은 마침표 없음
      function trimTrailingPeriod(s) {
        return String(s == null ? '' : s).replace(/\.+\s*$/, '');
      }
      // showModal({ title, desc, buttons: [{ text, kind, onClick }] })
      function showModal(opts) {
        opts = opts || {};
        var modal = $('#modal');
        var titleEl = $('#modal-title');
        var descEl = $('#modal-desc');
        var titleText = trimTrailingPeriod(opts.title || '');
        var descText = trimTrailingPeriod(opts.desc || '');
        titleEl.textContent = titleText;
        descEl.textContent = descText;
        // 디스크립션 없을 땐 타이틀의 하단 마진을 키워서 버튼과의 간격 확보
        titleEl.classList.toggle('modal__title--no-desc', !descText);
        var actions = $('#modal-actions');
        actions.innerHTML = '';
        var buttons = (opts.buttons && opts.buttons.length) ? opts.buttons : [{ text: '확인' }];
        buttons.forEach(function (b) {
          var btn = el('button', {
            type: 'button',
            class: 'modal__btn modal__btn--' + (b.kind || 'primary'),
            text: b.text || '확인',
          });
          btn.addEventListener('click', function () {
            hideModal();
            if (typeof b.onClick === 'function') b.onClick();
          });
          actions.appendChild(btn);
        });
        modal.classList.add('is-show');
        modal.setAttribute('aria-hidden', 'false');
        // 포커스를 첫 primary 버튼에
        setTimeout(function () {
          var primary = actions.querySelector('.modal__btn--primary, .modal__btn--danger') || actions.querySelector('.modal__btn');
          if (primary) primary.focus();
        }, 50);
      }
      function hideModal() {
        var modal = $('#modal');
        modal.classList.remove('is-show');
        modal.setAttribute('aria-hidden', 'true');
      }
      // 단일 확인 알럿
      function showAlert(title, desc, onClose) {
        showModal({
          title: title,
          desc: desc || '',
          buttons: [{ text: '확인', kind: 'primary', onClick: onClose }],
        });
      }
      // 예/아니오 확인. options: { confirmText, cancelText, danger, onConfirm, onCancel }
      // TDS 컨벤션: Primary(액션) 좌측 / Cancel 우측
      function showConfirm(title, desc, options) {
        options = options || {};
        showModal({
          title: title,
          desc: desc || '',
          buttons: [
            { text: options.confirmText || '확인', kind: 'primary', onClick: options.onConfirm },
            { text: options.cancelText || '취소', kind: 'secondary', onClick: options.onCancel },
          ],
        });
      }
      // ESC로 닫기, 오버레이 클릭으로 닫기
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && $('#modal').classList.contains('is-show')) hideModal();
      });
      $('#modal').addEventListener('click', function (e) {
        if (e.target.id === 'modal') hideModal();
      });

      function loadFromServer() {
        return fetch('../projects-data.json?t=' + Date.now(), { cache: 'no-store' })
          .then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
          });
      }

      // ---------- View switching ----------
      function switchView(name) {
        $all('.sidebar__item').forEach(function (b) {
          b.classList.toggle('is-active', b.dataset.view === name);
        });
        $all('.view').forEach(function (v) {
          v.classList.toggle('is-active', v.dataset.view === name);
        });
        if (name === 'add') renderAddForm();
        if (name === 'detail') renderDetail();
        // detail 뷰는 사이드바에 항목이 없어서 list/add 모두 비활성 — 자연스럽게 처리됨
      }

      function openProject(index) {
        EDITING_INDEX = index;
        EDIT_MODE = 'view';
        switchView('detail');
        // 스크롤 최상단으로
        try { window.scrollTo({ top: 0, behavior: 'instant' }); } catch (e) { window.scrollTo(0, 0); }
      }

      // ---------- List view ----------
      function renderList() {
        var host = $('#projects-list');
        host.innerHTML = '';
        STATE.projects = STATE.projects || [];
        $('#proj-count').textContent = STATE.projects.length;
        $('#sidebar-count').textContent = STATE.projects.length;

        if (STATE.projects.length === 0) {
          host.appendChild(el('div', { class: 'empty' }, [
            el('p', { class: 'empty__title', text: '아직 등록된 프로젝트가 없어요' }),
            el('p', { text: '좌측 메뉴 · 신규 등록 에서 프로젝트를 추가해 보세요.' }),
          ]));
          updateStatus();
          return;
        }

        // 검색 필터링 (이름 우선)
        var q = (SEARCH_QUERY || '').trim().toLowerCase();
        var filtered = STATE.projects.map(function (p, idx) {
          return { p: p, idx: idx };
        });
        if (q) {
          filtered = filtered.filter(function (x) {
            var hay = [
              x.p.name || '',
              x.p.title || '',
              x.p.id || '',
            ].join(' ').toLowerCase();
            return hay.indexOf(q) !== -1;
          });
        }

        if (filtered.length === 0) {
          host.appendChild(el('div', { class: 'empty' }, [
            el('p', { class: 'empty__title', text: '검색 결과가 없어요' }),
            el('p', { text: '"' + SEARCH_QUERY + '" 와 일치하는 프로젝트가 없어요.' }),
          ]));
          updateStatus();
          return;
        }

        filtered.forEach(function (entry) {
          host.appendChild(renderProj(entry.p, entry.idx));
        });
        updateStatus();
      }

      function renderProj(p, index) {
        var card = el('div', { class: 'proj' });

        var thumb = el('img', { class: 'proj__thumb', src: toPreviewUrl(p.thumbnail), alt: '' });
        thumb.addEventListener('error', function () { thumb.src = placeholderSvg(); });

        var nameEl = el('p', { class: 'proj__name', text: p.name || '제목 없음' });
        var headText = el('div', { class: 'proj__head-text' }, [nameEl]);

        var actions = el('div', { class: 'proj__actions' });
        var btnUp = iconBtn('up', function () { move(index, -1); }, false, '위로');
        if (index === 0) btnUp.disabled = true;
        var btnDown = iconBtn('down', function () { move(index, 1); }, false, '아래로');
        if (index === STATE.projects.length - 1) btnDown.disabled = true;
        actions.appendChild(btnUp);
        actions.appendChild(btnDown);
        actions.appendChild(iconBtn('copy', function () { duplicate(index); }, false, '복제', 'accent'));
        actions.appendChild(iconBtn('x', function () { removeProj(index); }, true, '삭제'));

        var head = el('div', { class: 'proj__head' }, [thumb, headText, actions]);

        // 카드 클릭 시 상세 페이지로 이동 (액션 버튼 클릭은 제외)
        card.addEventListener('click', function (e) {
          if (e.target.closest('.proj__actions')) return; // 액션 버튼은 통과
          openProject(index);
        });

        card.appendChild(head);
        return card;
      }

      // ---------- Detail / Edit view ----------
      function renderDetail() {
        var p = STATE.projects[EDITING_INDEX];
        var host = $('#detail-host');
        host.innerHTML = '';
        if (!p) {
          host.appendChild(el('div', { class: 'empty' }, [
            el('p', { class: 'empty__title', text: '프로젝트를 찾을 수 없어요' }),
            el('p', { text: '목록으로 돌아가 다시 선택해 주세요.' }),
          ]));
          return;
        }

        // 헤더

      // ---------- Gallery (shared) ----------
      function renderGallery(target, onChange) {
        var wrap = el('div', { class: 'field' });
        wrap.appendChild(el('div', { class: 'label' }, [
          '이미지',
          el('span', { class: 'label__hint', text: '원하는 만큼 추가 가능 · 썸네일 클릭/붙여넣기/드래그도 가능' }),
        ]));

        target.gallery = Array.isArray(target.gallery) ? target.gallery.slice() : [];
        var listEl = el('div', { class: 'gallery-list' });

        function refresh() {
          listEl.innerHTML = '';
          target.gallery.forEach(function (url, idx) {
            var preview = el('img', { class: 'img-input__preview', src: toPreviewUrl(url), alt: '' });
            preview.addEventListener('error', function () { preview.src = placeholderSvg(); });
            var input = el('input', {
              class: 'input', type: 'text', value: url || '',
              placeholder: 'https://… 또는 붙여넣기/드래그',
            });
            input.addEventListener('input', function (e) {
              target.gallery[idx] = e.target.value;
              preview.src = toPreviewUrl(e.target.value);
              onChange();
            });
            var uploadBtn = makeUploadButton(function (path) {
              target.gallery[idx] = path;
              input.value = path;
              preview.src = toPreviewUrl(path);
              onChange();
            });
            var removeBtn = iconBtn('x', function () {
              target.gallery.splice(idx, 1); refresh(); onChange();
            }, true, '이미지 제거');
            var row = el('div', { class: 'img-input' }, [preview, input, uploadBtn, removeBtn]);
            attachImagePasteAndDrop(row, input, preview, uploadBtn, function (path) {
              target.gallery[idx] = path;
              input.value = path;
              preview.src = toPreviewUrl(path);
              onChange();
            });
            listEl.appendChild(row);
          });
        }

        var addBtn = el('button', { class: 'gallery-add', type: 'button', text: '+ 이미지 추가하기' });
        addBtn.addEventListener('click', function () {
          target.gallery.push(''); refresh(); onChange();
        });

        wrap.appendChild(listEl);
        wrap.appendChild(addBtn);
        refresh();
        return wrap;
      }

      // ---------- 입력 빌더 ----------
      function textInput(label, value, hint, onChange, modifier) {

          class: 'input' + (modifier === 'mono' ? ' input--mono' : ''),
          type: 'text', value: value || '',
        });
        input.addEventListener('input', function (e) { onChange(e.target.value); });
        var labelEl = el('label', { class: 'label' }, [
          label,
          hint ? el('span', { class: 'label__hint', text: hint }) : null,
        ]);
        return el('div', { class: 'field' }, [labelEl, input]);
      }
      function textareaInput(label, value, hint, onChange) {
        var t = el('textarea', { class: 'textarea', rows: '3' });
        t.value = value || '';
        t.addEventListener('input', function (e) { onChange(e.target.value); });
        var labelEl = el('label', { class: 'label' }, [
          label,
          hint ? el('span', { class: 'label__hint', text: hint }) : null,
        ]);
        return el('div', { class: 'field' }, [labelEl, t]);
      }
      function imageInputField(label, hint, value, onChange) {
        var input = el('input', {
          class: 'input', type: 'text', value: value || '',
          placeholder: 'https://… 또는 붙여넣기/드래그',
        });
        var preview = el('img', { class: 'img-input__preview', src: toPreviewUrl(value), alt: '' });
        preview.addEventListener('error', function () { preview.src = placeholderSvg(); });
        input.addEventListener('input', function (e) {
          preview.src = toPreviewUrl(e.target.value);
          onChange(e.target.value);
        });
        var uploadBtn = makeUploadButton(function (path) {
          input.value = path;
          preview.src = toPreviewUrl(path);
          onChange(path);
        });
        var labelEl = el('label', { class: 'label' }, [
          label,
          hint ? el('span', { class: 'label__hint', text: hint }) : null,
        ]);
        var row = el('div', { class: 'img-input' }, [preview, input, uploadBtn]);
        attachImagePasteAndDrop(row, input, preview, uploadBtn, function (path) {
          input.value = path;
          preview.src = toPreviewUrl(path);
          onChange(path);
        });
        return el('div', { class: 'field' }, [labelEl, row]);
      }

      // 이미지 입력 행에 붙여넣기/드래그앤드롭/썸네일 클릭 업로드 부착
      function attachImagePasteAndDrop(row, input, preview, uploadBtn, onUploaded) {
        var actualBtn = uploadBtn.querySelector('button');
        function applyUpload(blobOrFile, customName) {
          if (!blobOrFile) return;
          handleImageUpload(blobOrFile, actualBtn, onUploaded, customName);
        }

        // 붙여넣기 (input 또는 썸네일에 포커스 시)
        function onPaste(e) {
          var items = e.clipboardData && e.clipboardData.items;
          if (!items) return;
          for (var i = 0; i < items.length; i++) {
            var item = items[i];
            if (item.type && item.type.indexOf('image') === 0) {
              e.preventDefault();
              var blob = item.getAsFile();
              if (!blob) {
                showAlert('붙여넣기 실패', '클립보드에서 이미지를 읽을 수 없어요.\n다시 복사한 후 시도해 주세요.');
                return;
              }
              var mime = (blob.type || 'image/png');
              var ext = (mime.split('/')[1] || 'png').replace('jpeg', 'jpg').split(';')[0];
              applyUpload(blob, 'pasted-' + Date.now() + '.' + ext);
              return;
            }
          }
        }
        input.addEventListener('paste', onPaste);
        preview.addEventListener('paste', onPaste);
        preview.setAttribute('tabindex', '0');
        preview.style.cursor = 'pointer';
        preview.title = '클릭하여 업로드';
        preview.addEventListener('click', function () { actualBtn.click(); });

        // 드래그앤드롭
        ['dragenter', 'dragover'].forEach(function (evt) {
          row.addEventListener(evt, function (e) {
            if (e.dataTransfer && Array.from(e.dataTransfer.types || []).indexOf('Files') !== -1) {
              e.preventDefault();
              row.classList.add('img-input--dragover');
            }
          });
        });
        ['dragleave', 'drop'].forEach(function (evt) {
          row.addEventListener(evt, function () { row.classList.remove('img-input--dragover'); });
        });
        row.addEventListener('drop', function (e) {
          var files = e.dataTransfer && e.dataTransfer.files;
          if (!files || !files.length) return;
          var f = files[0];
          if (!f.type || f.type.indexOf('image') !== 0) {
            showAlert('업로드 불가', '이미지 파일만 업로드할 수 있어요');
            return;
          }
          e.preventDefault();
          applyUpload(f);
        });
      }

      // 업로드 버튼 (파일 선택 → 압축 → /api/upload-image)
      function makeUploadButton(onUploaded) {
        var btn = el('button', {
          class: 'upload-btn', type: 'button',
          html: ICONS.upload + '<span>업로드</span>',
          title: '내 컴퓨터에서 이미지 업로드',
        });
        var fileInput = el('input', { type: 'file', accept: 'image/*', style: 'display:none' });
        btn.addEventListener('click', function () { fileInput.click(); });
        fileInput.addEventListener('change', function (e) {
          var file = e.target.files && e.target.files[0];
          if (!file) return;
          handleImageUpload(file, btn, onUploaded);
          fileInput.value = ''; // 같은 파일 재업로드 가능하도록
        });
        var wrap = el('span', { style: 'display:contents' }, [btn, fileInput]);
        return wrap;
      }

      function handleImageUpload(file, btn, onUploaded, customName) {
        var pw = sessionStorage.getItem(SESSION_KEY);
        if (!pw) { showLogin(); return; }

        var label = btn.querySelector('span');
        var originalLabel = label.textContent;
        btn.disabled = true; label.textContent = '압축 중…';

        // 파일명 결정: 명시적 customName > file.name > 기본 timestamp
        var safeName = customName || (file && file.name) || ('upload-' + Date.now() + '.png');

        var stage = 'compress';
        var compressedBlob = null;
        compressImage(file, 1600, 0.78)
          .then(function (blob) {
            compressedBlob = blob; // 미리보기용으로 보관
            stage = 'base64';
            label.textContent = '업로드 중…';
            console.log('[upload] compressed size:', Math.round(blob.size / 1024) + 'KB');
            return blobToBase64(blob);
          })
          .then(function (base64) {
            stage = 'fetch';
            console.log('[upload] base64 length:', Math.round(base64.length / 1024) + 'KB');
            return fetch('/api/upload-image', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                password: pw,
                filename: safeName,
                contentBase64: base64,
              }),
            });
          })
          .then(function (r) {
            stage = 'response';
            if (r.status === 401) {
              sessionStorage.removeItem(SESSION_KEY);
              showLogin('비밀번호가 일치하지 않아요.');
              throw new Error('unauthorized');
            }
            if (!r.ok) {
              return r.text().then(function (text) {
                var msg;
                try { msg = JSON.parse(text).error || text; }
                catch { msg = text || ('HTTP ' + r.status); }
                console.error('[upload] server response:', { status: r.status, body: text });
                throw new Error('HTTP ' + r.status + ': ' + msg.slice(0, 200));
              });
            }
            return r.json();
          })
          .then(function (data) {
            // Vercel 리빌드 전(30~60초)엔 /images/... 가 404나기 때문에,
            // 클라이언트가 가지고 있는 압축 blob을 URL.createObjectURL로 즉시 미리보기에 사용.
            // 외부 요청 없음 → private 저장소도 안전. 새로고침 후엔 Vercel 서빙으로 자연스럽게 전환.
            if (data && data.path && compressedBlob) {
              IMG_OVERRIDES[data.path] = URL.createObjectURL(compressedBlob);
            }
            onUploaded(data.path);
          })
          .catch(function (err) {
            console.error('[upload] stage=' + stage + ' file=', file, 'err=', err);
            if (err.message !== 'unauthorized') {
              showAlert('업로드 실패', '에러 코드: ' + stage + '\n' + (err.message || '알 수 없는 오류'));
            }
          })
          .then(function () {
            btn.disabled = false; label.textContent = originalLabel;
          });
      }

      // 클라이언트 사이드 이미지 압축 (긴 변 maxWidth, JPEG quality)
      function compressImage(file, maxWidth, quality) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onload = function () {
            var img = new Image();
            img.onload = function () {
              var ratio = Math.min(1, maxWidth / Math.max(img.width, img.height));
              var w = Math.round(img.width * ratio);
              var h = Math.round(img.height * ratio);
              var canvas = document.createElement('canvas');
              canvas.width = w; canvas.height = h;
              var ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, w, h);
              canvas.toBlob(function (blob) {
                if (blob) resolve(blob);
                else reject(new Error('압축 실패'));
              }, 'image/jpeg', quality);
            };
            img.onerror = function () { reject(new Error('이미지 로드 실패')); };
            img.src = reader.result;
          };
          reader.onerror = function () { reject(new Error('파일 읽기 실패')); };
          reader.readAsDataURL(file);
        });
      }

      function blobToBase64(blob) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onload = function () {
            var result = reader.result;
            var base64 = result.substring(result.indexOf(',') + 1);
            resolve(base64);
          };
          reader.onerror = function () { reject(new Error('Base64 변환 실패')); };
          reader.readAsDataURL(blob);
        });
      }
      function iconBtn(iconName, onClick, danger, title, accent) {
        var classes = 'icon-btn';
        if (danger) classes += ' icon-btn--danger';
        if (accent === 'accent') classes += ' icon-btn--accent';
        var b = el('button', { class: classes, type: 'button', title: title || '', html: ICONS[iconName] || '' });
        b.addEventListener('click', onClick);
        return b;
      }
      function placeholderSvg() {
        return 'data:image/svg+xml;utf8,' + encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56"><rect fill="#F2F4F6" width="56" height="56"/><text x="28" y="32" text-anchor="middle" font-family="system-ui" font-size="9" fill="#B0B8C1">no image</text></svg>'
        );
      }
      // 미리보기 경로 변환:
      //  - 업로드 직후 같은 세션: IMG_OVERRIDES의 blob URL (메모리, 즉시 표시)
      //  - 새로고침 후: GitHub raw URL (public 저장소라 인증 없이 항상 응답)
      //  - 외부 URL(http/https/data)은 그대로 통과
      var GH_OWNER = 'cyr1130';
      var GH_REPO = 'rustic-collage';
      var GH_BRANCH = 'main';
      var IMG_OVERRIDES = Object.create(null); // path → blob: URL
      function toPreviewUrl(p) {
        if (!p) return placeholderSvg();
        if (IMG_OVERRIDES[p]) return IMG_OVERRIDES[p];
        if (p.indexOf('./images/') === 0) {
          // public 저장소 raw URL — Vercel 리빌드 상태 무관하게 즉시 응답
          return 'https://raw.githubusercontent.com/' + GH_OWNER + '/' + GH_REPO + '/' + GH_BRANCH + '/' + p.slice(2);
        }
        if (p.indexOf('./') === 0) return p.slice(1);
        return p;
      }

      // ---------- 액션 ----------
      function move(index, delta) {
        var to = index + delta;
        if (to < 0 || to >= STATE.projects.length) return;
        var arr = STATE.projects;
        var tmp = arr[index]; arr[index] = arr[to]; arr[to] = tmp;
        renderList(); markDirty();
      }
      function removeProj(index) {
        var p = STATE.projects[index];
        showConfirm('"' + (p && p.name ? p.name : '제목 없음') + '"이 프로젝트를\n정말 삭제하시겠습니까?', '', {
          confirmText: '삭제',
          cancelText: '취소',
          danger: true,
          onConfirm: function () {
            STATE.projects.splice(index, 1);
            renderList(); markDirty();
          },
        });
      }
      function duplicate(index) {
        var src = STATE.projects[index];
        var copy = JSON.parse(JSON.stringify(src));
        var others = STATE.projects.map(function (x) { return x.id; });
        copy.id = uniqueId(src.id + '-copy', others);
        copy.name = (src.name || '') + ' (복제)';
        copy._idEdited = true;
        STATE.projects.splice(index + 1, 0, copy);
        renderList(); markDirty();
      }
      function markDirty() { updateStatus(); }

      // ---------- 저장 ----------
      function save() {
        var pw = sessionStorage.getItem(SESSION_KEY);
        if (!pw) { showLogin(); return; }
        if (!isDirty()) {
          // 변경사항 없으면 조용히 무시
          return;
        }
        $('#btn-save').disabled = true;
        setStatus('saving', '저장하고 있어요…');
        var payload = STATE.projects.map(function (p) {
          var clean = {};
          Object.keys(p).forEach(function (k) {
            if (k.charAt(0) !== '_') clean[k] = p[k];
          });
          return clean;
        });
        fetch('/api/save-projects', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw, projects: payload }),
        })
          .then(function (r) {
            if (r.status === 401) {
              sessionStorage.removeItem(SESSION_KEY);
              showLogin('비밀번호가 일치하지 않아요.');
              throw new Error('unauthorized');
            }
            if (!r.ok) {
              return r.text().then(function (text) {
                var d;
                try { d = JSON.parse(text); } catch { d = { error: text }; }
                console.error('[save] server response:', { status: r.status, body: d });
                throw new Error((d.error || ('HTTP ' + r.status)) + (d.diag ? '  | diag=' + JSON.stringify(d.diag) : ''));
              });
            }
            return r.json();
          })
          .then(function () {
            SAVED_SNAPSHOT = snapshot();
            setStatus('saved', '저장됐어요 ✓');
            showAlert('저장이 완료되었어요\n30~60초 안에 사이트에 반영됩니다', '');
            setTimeout(function () {
              var status = $('#save-status');
              if (status.dataset.state === 'saved') {
                status.dataset.state = 'idle'; updateStatus();
              }
            }, 2500);
          })
          .catch(function (err) {
            if (err.message !== 'unauthorized') {
              setStatus('error', '저장 실패');
              showAlert('저장 실패', err.message || '알 수 없는 오류가 발생했어요.');
              setTimeout(function () {
                var status = $('#save-status');
                if (status.dataset.state === 'error') {
                  status.dataset.state = 'idle'; updateStatus();
                }
              }, 3500);
            }
          })
          .then(function () { $('#btn-save').disabled = false; });
      }

      // ---------- 로그인 ----------
      function showLogin(errorMsg) {
        var login = $('#login');
        login.classList.add('is-show');
        var err = $('#login-error');
        if (errorMsg) { err.textContent = errorMsg; err.hidden = false; }
        else { err.hidden = true; }
        setTimeout(function () { $('#login-password').focus(); }, 50);
      }
      function hideLogin() { $('#login').classList.remove('is-show'); }

      $('#login-form').addEventListener('submit', function (e) {
        e.preventDefault();
        var pw = $('#login-password').value;
        if (!pw) return;
        sessionStorage.setItem(SESSION_KEY, pw);
        hideLogin();
        save();
      });

      document.addEventListener('keydown', function (e) {
        if ((e.metaKey || e.ctrlKey) && e.key === 's') {
          e.preventDefault();
          save();
        }
      });
      window.addEventListener('beforeunload', function (e) {
        if (isDirty()) {
          e.preventDefault();
          e.returnValue = '저장하지 않은 변경사항이 있어요. 정말 나가시겠어요?';
          return e.returnValue;
        }
      });

      var isMac = /Mac|iPhone|iPad/.test(navigator.platform);

      // ---------- 이벤트 바인딩 ----------
      $('#btn-save').addEventListener('click', save);
      $('#btn-reload').addEventListener('click', function () {
        if (isDirty()) {
          showConfirm('저장하지 않은 변경사항이 사라져요\n다시 불러올까요?', '', {
            confirmText: '다시 불러오기',
            cancelText: '취소',
            danger: true,
            onConfirm: function () { init(); },
          });
          return;
        }
        init();
      });
      $('#btn-add-submit').addEventListener('click', submitDraft);
      $('#btn-add-reset').addEventListener('click', resetDraft);

      // 검색 입력 — 디바운스 가볍게 적용
      var searchTimer = null;
      $('#search-input').addEventListener('input', function (e) {
        clearTimeout(searchTimer);
        var v = e.target.value;
        searchTimer = setTimeout(function () {
          SEARCH_QUERY = v;
          renderList();
        }, 120);
      });

      $all('.sidebar__item').forEach(function (b) {
        b.addEventListener('click', function () {
          // 사이드바로 이동할 때 검색 초기화 안 함 (사용자 의도 유지)
          switchView(b.dataset.view);
        });
      });

      // fetch 실패 시 사용할 빈 폴백
      var SAMPLE_FALLBACK = { projects: [] };

      function init() {
        var host = $('#projects-list');
        host.innerHTML = '<div class="loading">불러오고 있어요…</div>';
        var isLocalFile = location.protocol === 'file:';
        loadFromServer()
          .then(function (data) {
            STATE = { projects: (data.projects || []).map(function (p) {
              return Object.assign({}, p, { _idEdited: !!p.id });
            }) };
            SAVED_SNAPSHOT = snapshot();
            renderList();
          })
          .catch(function (err) {
            console.warn('projects-data.json 로드 실패 → 샘플 데이터로 대체:', err);
            // file:// 또는 다른 이유로 fetch 실패 시 샘플 데이터 표시
            STATE = { projects: SAMPLE_FALLBACK.projects.map(function (p) {
              return Object.assign({}, p, { _idEdited: true });
            }) };
            SAVED_SNAPSHOT = snapshot();
            renderList();
            // 로컬 미리보기/폴백 안내는 콘솔에만 (불필요한 모달 방지)
            if (!isLocalFile) {
              showAlert('데이터 로드 실패', '저장된 데이터를 불러오지 못했어요.\n새로고침을 시도해 주세요.');
            }
          });
      }
      init();
    </script>
  </body>
</html>

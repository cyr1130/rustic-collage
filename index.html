<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rustic Collage</title>
    <meta
      name="description"
      content="나무마다 결이 다르듯, 사람도 모두 다릅니다. 그 과정을 리스틱 콜라주가 함께합니다."
    />

    <!-- 폰트: 사이트 전체 Pretendard -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css"
    />

    <link rel="stylesheet" href="./style.css" />
    <script src="./components.js"></script>
  </head>
  <body>
    <!-- 공통 헤더(nav + drawer) — components.js 에서 단일 소스로 렌더링 -->
    <rc-nav></rc-nav>

    <main id="top">
      <!-- ======================== HERO ======================== -->
      <section class="hero">
        <!-- 자동 슬라이드 (이미지 3장) — site-config.json 에서 주입 -->
        <div class="hero__bg" id="hero-bg" aria-hidden="true">
          <div class="hero__slide hero__slide--1">
            <img src="" alt="" loading="eager" fetchpriority="high" />
          </div>
          <div class="hero__slide hero__slide--2">
            <img src="" alt="" loading="lazy" fetchpriority="low" decoding="async" />
          </div>
          <div class="hero__slide hero__slide--3">
            <img src="" alt="" loading="lazy" fetchpriority="low" decoding="async" />
          </div>
        </div>

        <div class="hero__inner">
          <div class="hero__text">
            <h1 class="hero__title" id="hero-title">Rustic Collage</h1>
            <p class="hero__copy hero__copy--ko" id="hero-copy-ko"></p>
            <p class="hero__copy hero__copy--en" id="hero-copy-en"></p>
          </div>
        </div>

        <script>
          (function () {
            fetch('./site-config.json?t=' + Date.now())
              .then(function (r) { return r.ok ? r.json() : null; })
              .then(function (cfg) {
                if (!cfg) return;
                // 히어로
                if (cfg.hero) {
                  var h = cfg.hero;
                  var slides = document.querySelectorAll('#hero-bg .hero__slide img');
                  (h.images || []).slice(0, 3).forEach(function (src, i) {
                    if (slides[i] && src) slides[i].src = src;
                  });
                  if (h.title) document.getElementById('hero-title').textContent = h.title;
                  if (h.copyKo) document.getElementById('hero-copy-ko').innerHTML = nlToBr(esc(h.copyKo));
                  if (h.copyEn) document.getElementById('hero-copy-en').innerHTML = nlToBr(esc(h.copyEn));
                }
                // 홈 컬렉션 카드 4개 — 카테고리별 이름/이미지/링크 갱신
                if (Array.isArray(cfg.homeCollection)) {
                  var grid = document.getElementById('home-collection-grid');
                  if (grid) {
                    var cards = grid.querySelectorAll('.product-card');
                    cfg.homeCollection.slice(0, cards.length).forEach(function (item, i) {
                      var card = cards[i];
                      if (!card) return;
                      var img = card.querySelector('img');
                      var nameEl = card.querySelector('.product-card__name');
                      if (item.image && img) img.src = item.image;
                      if (item.name && nameEl) nameEl.textContent = item.name;
                      if (img) img.alt = item.name || '';
                      if (item.category) {
                        card.setAttribute('href', './collection.html?cat=' + encodeURIComponent(item.category));
                      }
                    });
                  }
                }
                // 전화번호 — 컨택트 섹션의 CALL 링크 갱신
                if (cfg.phone) {
                  var telDigits = String(cfg.phone).replace(/[^\d+]/g, '');
                  var contactPhone = document.getElementById('contact-phone-link');
                  if (contactPhone) {
                    contactPhone.href = 'tel:' + telDigits;
                    contactPhone.textContent = 'CALL : ' + cfg.phone;
                  }
                  // 풋터 전화번호
                  var footerPhone = document.getElementById('footer-phone');
                  if (footerPhone) {
                    footerPhone.href = 'tel:' + telDigits;
                    footerPhone.textContent = cfg.phone;
                  }
                }
                // 이메일 — formsubmit URL + 표시되는 이메일 모두 갱신
                if (cfg.email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(cfg.email)) {
                  var form = document.getElementById('contact-form');
                  if (form) form.action = 'https://formsubmit.co/' + encodeURIComponent(cfg.email);
                  // 컨택 섹션에 표시되는 이메일 링크
                  var contactEmail = document.getElementById('contact-email-link');
                  if (contactEmail) {
                    contactEmail.href = 'mailto:' + cfg.email;
                    contactEmail.textContent = 'EMAIL : ' + cfg.email;
                  }
                  // 풋터 이메일
                  var footerEmail = document.getElementById('footer-email');
                  if (footerEmail) {
                    footerEmail.href = 'mailto:' + cfg.email;
                    footerEmail.textContent = cfg.email;
                  }
                }
              })
              .catch(function () { /* 설정 없으면 기본값 유지 */ });
            function esc(s) {
              return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
                return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
              });
            }
            function nlToBr(s) {
              // <br> 입력 허용 + 줄바꿈 → <br>
              return String(s).replace(/&lt;br\s*\/?&gt;/gi, '\n').replace(/\n/g, '<br>');
            }
          })();
        </script>
      </section>

      <!-- ======================== COLLECTION ======================== -->
      <section class="collection" id="collection">
        <div class="container">
          <div class="collection__head">
            <h2 class="collection__title">Colllage Collection</h2>
            <a class="pill-btn" href="#">
              <span class="pill-btn__label">View All Products</span>
              <span class="pill-btn__arrow" aria-hidden="true">→</span>
            </a>
          </div>

          <!-- 4개 카테고리 카드 — site-config.json 의 homeCollection 에서 동적으로 채워짐 -->
          <div class="collection__grid" id="home-collection-grid">
            <a class="product-card" data-cat-index="0" href="./collection.html">
              <figure class="product-card__media">
                <img src="https://framerusercontent.com/images/mWGKWCXw1em9l6sTY9wdoJWJM.jpg?width=1200" alt="" loading="lazy" />
              </figure>
              <p class="product-card__name">165</p>
            </a>
            <a class="product-card" data-cat-index="1" href="./collection.html">
              <figure class="product-card__media">
                <img src="https://framerusercontent.com/images/7nPpvgDGNRpPRcKCGP8AfeHakCQ.jpg?width=1200" alt="" loading="lazy" />
              </figure>
              <p class="product-card__name">190</p>
            </a>
            <a class="product-card" data-cat-index="2" href="./collection.html">
              <figure class="product-card__media">
                <img src="https://framerusercontent.com/images/ztVfgze1PwplOyJghqO9aBP6Y.jpg?width=1200" alt="" loading="lazy" />
              </figure>
              <p class="product-card__name">240</p>
            </a>
            <a class="product-card" data-cat-index="3" href="./collection.html">
              <figure class="product-card__media">
                <img src="https://framerusercontent.com/images/XTkp20wHzW9mUi8nbUXiVmnMbo8.jpg?width=1200" alt="" loading="lazy" />
              </figure>
              <p class="product-card__name">Collage</p>
            </a>
          </div>

          <!-- 모바일 전용 풀폭 CTA -->
          <a class="pill-btn pill-btn--full collection__cta-mobile" href="./collection.html">
            <span class="pill-btn__label">View All Products</span>
            <span class="pill-btn__arrow" aria-hidden="true">→</span>
          </a>
        </div>
      </section>

      <!-- ======================== PROJECTS ======================== -->
      <section class="projects" id="projects">
        <div class="container">
          <div class="projects__head">
            <h2 class="projects__title">Projects</h2>
            <a class="pill-btn" href="projects.html">
              <span class="pill-btn__label">View All Projects</span>
              <span class="pill-btn__arrow" aria-hidden="true">→</span>
            </a>
          </div>

          <div class="projects__grid" id="home-projects-grid">
            <!-- projects-data.json 에서 최신순으로 자동 렌더링됨 -->
          </div>

          <!-- 모바일 전용 풀폭 CTA -->
          <a class="pill-btn pill-btn--full projects__cta-mobile" href="projects.html">
            <span class="pill-btn__label">View All Projects</span>
            <span class="pill-btn__arrow" aria-hidden="true">→</span>
          </a>
        </div>

        <script>
          (function () {
            var grid = document.getElementById('home-projects-grid');
            if (!grid) return;
            var MAX_CARDS = 6;
            fetch('./projects-data.json?t=' + Date.now())
              .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
              })
              .then(function (data) {
                var list = (data.projects || []).slice().reverse().slice(0, MAX_CARDS);
                if (!list.length) {
                  grid.innerHTML = '<p style="color:#888;font-size:14px;">아직 등록된 프로젝트가 없습니다.</p>';
                  return;
                }
                grid.innerHTML = list.map(function (p, i) {
                  var name = esc(p.name || '');
                  // HOME 영역 전용 필드 사용 (없으면 fallback)
                  var thumbTitle = esc(p.thumbnailTitle || p.name || '');
                  // 썸네일 설명은 <br>를 줄바꿈으로 인식 (escMultiline)
                  var thumbDesc = escMultiline(p.thumbnailDesc || '');
                  var thumb = esc(p.thumbnail || '');
                  return (
                    '<a class="product-card" href="./project-detail.html?id=' + encodeURIComponent(p.id) + '">' +
                      '<figure class="product-card__media">' +
                        '<img src="' + thumb + '" alt="' + name + ' 프로젝트 이미지" loading="' + (i < 3 ? 'eager' : 'lazy') + '" />' +
                        '<div class="product-card__overlay">' +
                          '<h3 class="product-card__overlay-title">' + thumbTitle + '</h3>' +
                          (thumbDesc ? '<p class="product-card__overlay-desc">' + thumbDesc + '</p>' : '') +
                        '</div>' +
                      '</figure>' +
                    '</a>'
                  );
                }).join('');
              })
              .catch(function (err) {
                grid.innerHTML = '<p style="color:#888;font-size:14px;">프로젝트 목록을 불러오지 못했습니다.</p>';
                console.error(err);
              });
            function esc(s) {
              return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
                return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
              });
            }
            // <br>은 줄바꿈으로 허용, 그 외 HTML은 모두 이스케이프
            function escMultiline(s) {
              var withBreaks = String(s == null ? '' : s).replace(/<br\s*\/?>/gi, '\n');
              return esc(withBreaks).replace(/\n/g, '<br>');
            }
          })();
        </script>
      </section>

      <!-- ======================== CONTACT ======================== -->
      <section class="contact" id="contact">
        <img
          class="contact__bg"
          src="https://framerusercontent.com/images/U65xaN4OZnU9bF7RfkykBYcnlGo.jpg?width=2400&height=1600"
          alt=""
          loading="lazy"
        />
        <div class="container contact__inner">
          <div class="contact__card">
            <p class="contact__eyebrow">Contact</p>
            <h2 class="contact__title">Rustic Collage</h2>

            <div class="contact__call">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
              <a id="contact-phone-link" href="tel:01023940980">CALL : 01023940980</a>
            </div>

            <div class="contact__call contact__email-row">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <a id="contact-email-link" href="mailto:dbfldbfl11301130@gmail.com">EMAIL : dbfldbfl11301130@gmail.com</a>
            </div>

            <!--
              ▼ 이메일 수신: site-config.json 의 email 값을 사용 (어드민에서 변경 가능)
              최초 한 번 폼 제출 후 받은 인증 메일(formsubmit.co로부터)을 클릭하면 활성화됩니다.
            -->
            <form
              class="contact__form"
              action="https://formsubmit.co/dbfldbfl11301130@gmail.com"
              method="POST"
              novalidate
              id="contact-form"
            >
              <!-- formsubmit 옵션 -->
              <input type="hidden" name="_subject" value="홈페이지 문의 — Rustic Collage" />
              <input type="hidden" name="_template" value="table" />
              <input type="hidden" name="_captcha" value="false" />
              <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off" />

              <div class="contact__field">
                <input type="text" name="name" placeholder="이름" autocomplete="name" required />
              </div>

              <div class="contact__row">
                <div class="contact__field">
                  <input type="email" name="email" placeholder="Email" autocomplete="email" required />
                </div>
                <div class="contact__field">
                  <input type="tel" name="phone" placeholder="Phone" autocomplete="tel" />
                </div>
              </div>

              <div class="contact__field">
                <textarea name="message" placeholder="상담 내용을 자유롭게 작성해주세요" rows="5" required></textarea>
              </div>

              <button type="submit" class="contact__submit">SUBMIT</button>

              <p class="contact__feedback" role="status" aria-live="polite" hidden></p>
            </form>
          </div>
        </div>
      </section>

      <!-- 다음 섹션은 이미지 받는 대로 추가됩니다 -->
    </main>

    <!-- 공통 풋터 — components.js 에서 단일 소스로 렌더링 -->
    <rc-footer></rc-footer>

    <script src="./app.js"></script>
  </body>
</html>

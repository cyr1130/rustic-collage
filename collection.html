  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="keywords" content="러스틱꼴라주 컬렉션, 원목마루 종류, 165 마루, 190 마루, 240 마루, 콜라주 마루" />
    <meta name="robots" content="index, follow" />

    <link rel="canonical" href="https://rusticcollage.com/collection.html" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rustic Collage" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:title" content="Collage Collection — Rustic Collage" />
    <meta property="og:description" content="Rustic Collage 컬렉션 — 165 / 190 / 240 / Collage 라인업." />
    <meta property="og:url" content="https://rusticcollage.com/collection.html" />
    <meta property="og:image" content="https://rusticcollage.com/images/og_favicon/og.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Collage Collection — Rustic Collage" />
    <meta name="twitter:description" content="Rustic Collage 컬렉션 — 취향이 닿는 면을 고르는 일." />
    <meta name="twitter:image" content="https://rusticcollage.com/images/og_favicon/og.png" />

    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css"
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="./components.js"></script>
  </head>
  <body class="subpage subpage--light">
    <rc-nav></rc-nav>

    <main id="top">
      <!-- ======================== PAGE HEADER ======================== -->
      <section class="coll-page-hero">
        <div class="container">
          <h1 class="coll-page-hero__title" data-rc-anim="01">Collage Collection</h1>
        </div>
      </section>

      <!-- ======================== CATEGORY TABS ======================== -->
      <section class="coll-page-tabs">
        <div class="container">
          <div class="coll-tabs" role="tablist" aria-label="컬렉션 카테고리">
            <button type="button" class="coll-tabs__tab is-active" data-filter="all" role="tab" aria-selected="true">ALL</button>
            <button type="button" class="coll-tabs__tab" data-filter="165" role="tab" aria-selected="false">165</button>
            <button type="button" class="coll-tabs__tab" data-filter="190" role="tab" aria-selected="false">190</button>
            <button type="button" class="coll-tabs__tab" data-filter="240" role="tab" aria-selected="false">240</button>
            <button type="button" class="coll-tabs__tab" data-filter="collage" role="tab" aria-selected="false">Collage</button>
          </div>
        </div>
      </section>

      <!-- ======================== GRID LIST ======================== -->
      <section class="coll-page-list">
        <div class="container">
          <div class="coll-grid" id="coll-grid">
            <!-- collection-data.json 에서 자동 렌더링 -->
          </div>
          <p class="coll-empty" id="coll-empty" hidden>해당 카테고리에 등록된 제품이 없습니다.</p>
        </div>
      </section>

      <script>
        (function () {
          var tabs = document.querySelectorAll('.coll-tabs__tab');
          var grid = document.getElementById('coll-grid');
          var emptyMsg = document.getElementById('coll-empty');
          if (!grid) return;

          function esc(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
              return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
            });
          }

          // ---------- 데이터 로드 + 카드 렌더링 ----------
          fetch('./collection-data.json?t=' + Date.now())
            .then(function (r) {
              if (!r.ok) throw new Error('HTTP ' + r.status);
              return r.json();
            })
            .then(function (data) {
              var items = (data.items || []).slice();
              grid.innerHTML = items.map(function (it) {
                return (
                  '<a class="coll-card" data-cat="' + esc(it.category) + '" href="./collection-detail.html?id=' + encodeURIComponent(it.id) + '">' +
                    '<figure class="coll-card__media">' +
                      '<img src="' + esc(it.thumbnail) + '" alt="" loading="lazy" />' +
                    '</figure>' +
                    '<p class="coll-card__name">' + esc(it.name) + '</p>' +
                  '</a>'
                );
              }).join('');
              wireTabs();
            })
            .catch(function (err) {
              grid.innerHTML = '<p style="color:#888;font-size:14px;">컬렉션 목록을 불러오지 못했습니다.</p>';
              console.error(err);
            });

          // ---------- 탭 필터 ----------
          function wireTabs() {
            if (!tabs.length) return;
            function applyFilter(filter) {
              var cards = grid.querySelectorAll('.coll-card');
              var visibleCount = 0;
              cards.forEach(function (card) {
                var cat = card.getAttribute('data-cat');
                var show = filter === 'all' || cat === filter;
                if (show) {
                  card.removeAttribute('hidden');
                  visibleCount++;
                } else {
                  card.setAttribute('hidden', '');
                }
              });
              if (emptyMsg) emptyMsg.hidden = visibleCount !== 0;
            }
            function activate(tab) {
              tabs.forEach(function (t) {
                t.classList.remove('is-active');
                t.setAttribute('aria-selected', 'false');
              });
              tab.classList.add('is-active');
              tab.setAttribute('aria-selected', 'true');
              applyFilter(tab.getAttribute('data-filter') || 'all');
            }
            tabs.forEach(function (tab) {
              tab.addEventListener('click', function () { activate(tab); });
            });
            // URL ?cat=... 으로 진입 시 해당 탭 자동 활성화
            var params = new URLSearchParams(window.location.search);
            var requestedCat = (params.get('cat') || '').toLowerCase();
            if (requestedCat) {
              var matched = null;
              tabs.forEach(function (t) {
                if ((t.getAttribute('data-filter') || '').toLowerCase() === requestedCat) matched = t;
              });
              if (matched) activate(matched);
            }
          }
        })();
      </script>
    </main>

    <rc-footer></rc-footer>

    <script src="./app.js"></script>
  </body>
</html>

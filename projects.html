  </head>
  <body class="subpage subpage--light">
    <rc-nav></rc-nav>

    <main id="top">
      <!-- ======================== PAGE HEADER ======================== -->
      <section class="proj-page-hero">
        <div class="container">
          <h1 class="proj-page-hero__title" data-rc-anim="01">Projects</h1>
        </div>
      </section>

      <!-- ======================== GRID LIST ======================== -->
      <section class="proj-page-list">
        <div class="container">
          <div class="proj-page-list__grid" id="projects-grid">
            <!-- projects-data.json 에서 자동 렌더링됨 -->
          </div>
        </div>
      </section>

      <script>
        (function () {
          var grid = document.getElementById('projects-grid');
          if (!grid) return;
          fetch('./projects-data.json?t=' + Date.now())
            .then(function (r) {
              if (!r.ok) throw new Error('HTTP ' + r.status);
              return r.json();
            })
            .then(function (data) {
              var html = (data.projects || [])
                .slice()
                .reverse()
                .map(function (p) {
                  return (
                    '<a class="proj-card" href="./project-detail.html?id=' +
                    encodeURIComponent(p.id) + '">' +
                      '<figure class="proj-card__media">' +
                        '<img src="' + esc(p.thumbnail) + '" alt="" loading="lazy" />' +
                      '</figure>' +
                      '<p class="proj-card__name">' + esc(p.name) + '</p>' +
                    '</a>'
                  );
                })
                .join('');
              grid.innerHTML = html;
            })
            .catch(function (err) {
              grid.innerHTML = '<p style="color:#888;font-size:14px;">프로젝트 목록을 불러오지 못했습니다.</p>';
              console.error(err);
            });
          function esc(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
              return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
            });
          }
        })();
      </script>
    </main>

    <rc-footer></rc-footer>

    <script src="./app.js"></script>
  </body>
</html>
